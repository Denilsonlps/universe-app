name: Pipeline de Vagas
# NOTA: a Gupy bloqueia os IPs de nuvem do GitHub Actions (anti-robô), então a coleta
# retorna 0 vagas neste runner. O pipeline funciona localmente / numa máquina do campus
# (ver pipeline/README.md). O cron agendado fica desativado; mantém-se só a execução
# manual para fins de teste/demonstração.
on:
  workflow_dispatch: {}     # rodar manualmente (Actions → Run workflow)
  # schedule:
  #   - cron: '0 6 * * *'   # desativado: runner do GitHub é bloqueado pela Gupy

jobs:
  coletar-vagas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Instalar dependências
        run: pip install -r pipeline/requirements.txt
      - name: Gravar service account
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > pipeline/service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Rodar pipeline
        working-directory: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: service-account.json
          MAX_VAGAS: '30'
        run: python main.py
