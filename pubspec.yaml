name: universe_app
description: "Universe — app para estudantes do IFSP Campus Pirituba"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.3.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

  # Linting
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
