<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UNIVERSE — Logo</title>
<link rel="stylesheet" href="styles.css" />
<style>
  body { background: var(--bg); padding: 40px; }
  .row { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; margin-bottom: 36px; }
  .card { background: var(--card); border-radius: 22px; padding: 28px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .lbl { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }
  .swatch { width: 64px; height: 64px; border-radius: 14px; box-shadow: var(--shadow-sm); }
  h2 { font-weight: 800; color: var(--ink); margin: 0 0 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel">
function Sheet() {
  return (
    <div>
      <h2>App icon</h2>
      <div className="row">
        <div className="card"><UniverseAppIcon size={120} /><span className="lbl">120 · primary</span></div>
        <div className="card"><UniverseAppIcon size={72} /><span className="lbl">72</span></div>
        <div className="card"><UniverseAppIcon size={48} /><span className="lbl">48</span></div>
        <div className="card" style={{background:'#00573A'}}><UniverseMark size={84} color="#fff" dotColor="#26C17D" /><span className="lbl" style={{color:'rgba(255,255,255,.6)'}}>mark on green</span></div>
        <div className="card"><UniverseMark size={84} color="#00573A" /><span className="lbl">mark</span></div>
      </div>
      <h2>Wordmark</h2>
      <div className="row">
        <div className="card"><UniverseWordmark height={40} /><span className="lbl">on light</span></div>
        <div className="card" style={{background:'#00573A'}}><UniverseWordmark height={40} color="#fff" /><span className="lbl" style={{color:'rgba(255,255,255,.6)'}}>on green</span></div>
        <div className="card"><img src="assets/universe-wordmark.png" height="40" /><span className="lbl">original ref</span></div>
      </div>
      <h2>Secondary mark · palette</h2>
      <div className="row">
        <div className="card"><UniverseBadge size={56} color="#00573A" /><span className="lbl">badge</span></div>
        <div className="swatch" style={{background:'#003D28'}}></div>
        <div className="swatch" style={{background:'#00573A'}}></div>
        <div className="swatch" style={{background:'#008A5D'}}></div>
        <div className="swatch" style={{background:'#1FA971'}}></div>
        <div className="swatch" style={{background:'#26C17D'}}></div>
        <div className="swatch" style={{background:'#DCEEE4'}}></div>
        <div className="swatch" style={{background:'#F1F4F1',border:'1px solid #E4EAE5'}}></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Sheet />);
</script>
</body>
</html>
